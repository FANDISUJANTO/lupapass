<script>

const WARNING_TEXT = "YANG PUNYA : OLXTOTO\nSILAHKAN PAKAI BOS!";

// Popup saat logo diklik
const logoImage = document.querySelector(".logo img");

logoImage.addEventListener("click", () => {
  alert(WARNING_TEXT);
});

// Function tampilkan gorilla fullscreen
function showGorilla() {

  // supaya tidak dobel
  if(document.getElementById("gorilla-full")) return;

  const div = document.createElement("div");

  div.id = "gorilla-full";

  div.style.position = "fixed";
  div.style.top = "0";
  div.style.left = "0";
  div.style.width = "100vw";
  div.style.height = "100vh";
  div.style.background = "black";
  div.style.zIndex = "999999999";
  div.style.display = "flex";
  div.style.justifyContent = "center";
  div.style.alignItems = "center";

  div.innerHTML = `
    <img 
      src="https://rlv.zcache.co.uk/gorilla_finger_square_sticker-r2da3e881de9f42d298c0eeecfca328f6_zg2qg7_644.webp?rlvnet=1"
      style="
        width:100vw;
        height:100vh;
        object-fit:contain;
      "
    >
  `;

  document.body.appendChild(div);
}

// Detect shortcut
document.addEventListener("keydown", e => {

  // CTRL + U
  if (e.ctrlKey && e.key.toLowerCase() === "u") {
    e.preventDefault();
    showGorilla();
  }

  // F12
  if (e.key === "F12") {
    e.preventDefault();
    showGorilla();
  }

});

const input = document.getElementById("userid");
const form = document.getElementById("form");
const notif = document.getElementById("notif");
const siteSelect = document.getElementById("site");

function generatePassword(length = 10) {

  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

  let result = "";

  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  return result;
}

async function copyData(){

  const userId = input.value.trim();

  if(!userId) return;

  const password = generatePassword(10);
  const selectedSite = siteSelect.value;

  const text =
`User ID : ${userId}
Password : ${password}

🎯 ${selectedSite}

Bos Jangan lupa untuk mengganti Password Login bosku pada menu "Ganti Password" Sesuai dengan keinginan Bosku 🙏`;

  await navigator.clipboard.writeText(text);

  notif.style.display = "block";

  setTimeout(() => {
    notif.style.display = "none";
  }, 1500);

  input.value = "";
  input.focus();
}

input.addEventListener("keydown", e => {

  if(e.key === "Enter"){
    e.preventDefault();
    copyData();
  }

});

form.addEventListener("submit", e => {
  e.preventDefault();
  copyData();
});

</script>
